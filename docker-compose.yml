# Single bot (v2.2 worker transport). Copy .env.example -> .env, fill it, then:
#   docker compose up -d
# Then provide auth once (subscription): pass CLAUDE_CODE_OAUTH_TOKEN in .env, or
#   docker exec -it -u botuser claude-tg-bot claude auth login
services:
  bot:
    build: .
    image: claude-telegram-docker:v2.2
    container_name: claude-tg-bot
    env_file: .env
    environment:
      # v2.2 single-volume layout — everything under ~/.claude.
      CLAUDE_CONFIG_DIR: /home/botuser/.claude
      TELEGRAM_STATE_DIR: /home/botuser/.claude/telegram
      WORK_DIR: /home/botuser/.claude/workspace
      # Worker permission mode (auto->acceptEdits) + tool allowlist. Set in .env.
      PERMISSION_MODE: ${PERMISSION_MODE:-auto}
      TG_WORKER_ALLOWED_TOOLS: ${TG_WORKER_ALLOWED_TOOLS:-}
      TG_WORKER_PERMISSION_MODE: ${TG_WORKER_PERMISSION_MODE:-}
    volumes:
      - botclaude:/home/botuser/.claude
    # The worker is a headless daemon — no PTY needed (unlike the old --channels TUI).
    restart: unless-stopped

volumes:
  botclaude:
