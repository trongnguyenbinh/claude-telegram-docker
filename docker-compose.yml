# Single bot. Copy .env.example -> .env, fill it, then: docker compose up -d
# Then login once: docker exec -it claude-tg-bot claude setup-token
services:
  bot:
    build: .
    image: claude-telegram-docker
    container_name: claude-tg-bot
    env_file: .env
    environment:
      CLAUDE_CONFIG_DIR: /data/.claude
      TELEGRAM_STATE_DIR: /data/telegram
      # Permission policy for the bot's Claude session.
      # default | acceptEdits | bypassPermissions | plan. Unset = claude default.
      # Set PERMISSION_MODE in .env. For a fully autonomous bot (run any tool
      # without prompting) choose bypassPermissions — opt in deliberately.
      PERMISSION_MODE: ${PERMISSION_MODE:-}
      # Directory the bot's claude session runs in (file ops land here, persisted).
      WORK_DIR: ${WORK_DIR:-/working-directory/claude-telegram-bot}
    volumes:
      - botdata:/data
      - botwork:/working-directory
    # claude --channels is an interactive TUI → needs a PTY:
    tty: true
    stdin_open: true
    restart: unless-stopped

volumes:
  botdata:
  botwork:
