name: Publish image to GHCR

# Builds the bot image and publishes it to GitHub Container Registry.
# No local Docker needed — CI builds linux/amd64 + linux/arm64 and pushes
# ghcr.io/<owner>/claude-telegram-docker:latest (+ sha + tag).
on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (for arm64 emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            # :latest ONLY on the default branch (main). A `v*` tag push therefore
            # publishes :vX.Y.Z (+ :sha) but does NOT move :latest — so recreating a
            # running bot on :latest never silently jumps it onto a breaking release.
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Playwright variant (real node + Chromium) for bots that render UI + screenshot.
  # amd64 only (Chromium arm64 build under QEMU is slow/flaky); most bot VPS are amd64.
  # Branch push  -> builds FROM :latest,  tags :playwright.
  # Tag push v*  -> builds FROM the TAGGED base (:vX.Y.Z), tags :vX.Y.Z-playwright
  #                 (never depends on :latest, and does NOT move :playwright).
  build-playwright:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute base + playwright tag (tag build -> tagged base)
        id: pw
        run: |
          REPO="ghcr.io/${{ github.repository }}"
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "base=$REPO:${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
            echo "tags=$REPO:${{ github.ref_name }}-playwright" >> "$GITHUB_OUTPUT"
          else
            echo "base=$REPO:latest" >> "$GITHUB_OUTPUT"
            echo "tags=$REPO:playwright" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push playwright variant
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.playwright
          build-args: BASE=${{ steps.pw.outputs.base }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.pw.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
